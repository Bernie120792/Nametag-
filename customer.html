<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Voucher Dispenser</title>
<style>
body{
  font-family:Arial, sans-serif;
  text-align:center;
  padding:25px;
  min-height:100vh;
  margin:0;
  background-image: url('background.png'); /* Background PNG */
  background-size: cover;
  background-repeat: no-repeat;
  background-position: center;
}

/* Default Portrait Layout */
.container{
  display:block;
}

/* IMAGE HEADER */
.header-img{
  width:100%;
  max-width:400px;
  margin-bottom:20px;
}

/* BUTTON GRID */
.buttons{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  max-width:360px;
  margin:auto;
  margin-bottom:35px;
}
button{
  padding:14px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
  cursor:pointer;
  font-weight:bold;
  box-shadow:0 4px 8px rgba(0,0,0,0.1);
  transition:.2s;
}
button:hover{
  background:#16a34a;
  transform:scale(1.03);
}
.price{font-size:16px;}
.validity{font-size:12px;opacity:.9;}
button:disabled{background:#94a3b8;cursor:not-allowed;}

/* CARD */
.card{
  display:none;
  padding:20px;
  border-radius:14px;
  background: rgba(255,255,255,0.95);
  box-shadow:0 10px 20px rgba(0,0,0,.1);
  width:280px;
  margin:auto;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:1000;
}
.close{
  position:absolute;
  top:10px;
  right:14px;
  font-size:20px;
  cursor:pointer;
  color:#64748b;
}
.small{font-size:14px;color:#64748b;}
.voucher{
  font-size:26px;font-weight:bold;letter-spacing:3px;margin-top:10px;color:#0f172a;
}
.validity-card{
  margin-top:12px;font-size:15px;color:#16a34a;font-weight:bold;
}
.copy-btn, .buy-btn{
  margin-top:15px;
  background:#2563eb;
  padding:10px 18px;
  border-radius:8px;
  font-size:14px;
  color:white;
  cursor:pointer;
  border:none;
}
.copy-btn:hover, .buy-btn:hover{background:#1d4ed8;}
.processing{
  display:none;
  margin-top:12px;
  font-size:18px;
  color:#334155;
}

/* LANDSCAPE SPLIT LAYOUT */
@media screen and (orientation: landscape) {
  body{
    text-align:left;
  }
  .container{
    display:flex;
    justify-content:space-between;
    align-items:center;
    max-width:90%;
    margin:auto;
  }
  .buttons{
    max-width:45%;
    margin:0;
    gap:12px;
  }
  .card{
    position:relative;
    top:auto;
    left:auto;
    transform:none;
    margin:0;
    max-width:45%;
  }
}
</style>
</head>
<body>

<!-- IMAGE HEADER -->
<img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiye-B_drr_mqYae15aQkkLrUTn2uGs8PZohbBlX7ZOE4ysF9LhN2RkSgEb5f8pahFKBtwRlEA_uKfie-crn41MBktA634w8arFNYABqyD2eDCrhWuEuqWLjDdQZKwIY3wb0j34xa5AmEL4XVHGiAIzS7nEoihdXbgvxxoEUKvSnhNXRzm_6FMIfBhjlqs/s200/1.png" alt="Buy Voucher" class="header-img">

<div class="container">
  <div class="buttons" id="buttonGrid">
    <button onclick="selectVoucher(this,'V5','1 Hour')"><div class="price">₱5</div><div class="validity">1 Hour</div></button>
    <button onclick="selectVoucher(this,'V10','3 Hours')"><div class="price">₱10</div><div class="validity">3 Hours</div></button>
    <button onclick="selectVoucher(this,'V15','5 Hours')"><div class="price">₱15</div><div class="validity">5 Hours</div></button>
    <button onclick="selectVoucher(this,'V20','8 Hours')"><div class="price">₱20</div><div class="validity">8 Hours</div></button>
    <button onclick="selectVoucher(this,'V30','12 Hours')"><div class="price">₱30</div><div class="validity">12 Hours</div></button>
    <button onclick="selectVoucher(this,'V50','1 Day')"><div class="price">₱50</div><div class="validity">1 Day</div></button>
    <button onclick="selectVoucher(this,'V100','3 Days')"><div class="price">₱100</div><div class="validity">3 Days</div></button>
    <button onclick="selectVoucher(this,'V200','7 Days')"><div class="price">₱200</div><div class="validity">7 Days</div></button>
    <button onclick="selectVoucher(this,'V300','30 Days')"><div class="price">₱300</div><div class="validity">30 Days</div></button>
  </div>

  <div class="card" id="voucherCard">
    <div class="close" onclick="resetCard()">✕</div>
    <div class="small">Selected Voucher</div>
    <div class="voucher" id="voucherAmount">₱0</div>
    <div class="validity-card" id="validityCard"></div>
    <button class="buy-btn" onclick="buyVoucher()" id="buyBtn">Buy Voucher</button>
    <div class="processing" id="loading">Processing...</div>
    <button class="copy-btn" onclick="copyVoucher()" id="copyBtn" style="display:none;">Copy Voucher</button>
  </div>
</div>

<script>
let used=false;
let selectedVoucher = null;
let activeButton = null;

function selectVoucher(button,sheet,validity){
  if(document.getElementById('voucherCard').style.display === "block") return;
  selectedVoucher = {sheet, validity};
  activeButton = button;
  document.getElementById('voucherAmount').innerText = sheet.replace('V','₱');
  document.getElementById('validityCard').innerText = "Validity: "+validity;
  document.getElementById('voucherCard').style.display="block";
  document.getElementById('copyBtn').style.display="none";
  document.getElementById('loading').style.display="none";
  document.querySelectorAll('#buttonGrid button').forEach(b=>{
    if(b!==button) b.disabled=true;
  });
}

function buyVoucher(){
  if(!selectedVoucher || used) return;
  used=true;
  document.getElementById('loading').style.display="block";
  fetch("https://script.google.com/macros/s/AKfycbyahQIRUSYU_1qx_hAb3dZPAdc94gDp5MHgohTHqk2QoPSN0QfopVmoL68a-hN7oofkuw/exec?sheet="+selectedVoucher.sheet)
  .then(r=>r.text())
  .then(v=>{
    document.getElementById('loading').style.display="none";
    document.getElementById('voucherAmount').innerText = v;
    document.getElementById('copyBtn').style.display="inline-block";
  })
  .catch(()=>{
    document.getElementById('loading').style.display="none";
    alert("Error getting voucher");
    used=false;
  });
}

function copyVoucher(){
  let code = document.getElementById("voucherAmount").innerText;
  navigator.clipboard.writeText(code);
  let btn=document.getElementById("copyBtn");
  btn.innerText="Copied!";
  setTimeout(()=>{btn.innerText="Copy Voucher";},2000);
}

function resetCard(){
  used=false;
  document.getElementById('voucherCard').style.display="none";
  document.getElementById('copyBtn').style.display="none";
  selectedVoucher = null;
  document.querySelectorAll('#buttonGrid button').forEach(b=>b.disabled=false);
}
</script>

</body>
</html>
