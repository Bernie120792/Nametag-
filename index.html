<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Sidebar System</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<!-- Font Awesome CDN -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
body{
  margin:0;
  font-family:Arial;
  overflow:hidden;
  touch-action:manipulation;
}

/* top bar */
.topbar{
  height:40px;          
  background:#111;
  color:white;
  display:flex;
  align-items:center;
  padding-left:8px;
  font-size:10px;       
}

.menu-btn{
  font-size:20px;       
  cursor:pointer;
  margin-right:8px;
}

/* sidebar */
.sidebar{
  position:fixed;
  left:-180px;          
  top:0;
  width:180px;          
  height:100%;
  background:#222;
  transition:0.3s;
  padding-top:40px;     
  z-index:10;
}

.sidebar button{
  width:85%;            
  margin:8px auto;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:10px;
  border:none;
  background:#333;
  color:white;
  font-size:16px;
  cursor:pointer;
  border-radius:5px;
}

.sidebar button i{
  margin-right:5px;
}

.sidebar button:hover{
  background:#555;
}

/* overlay para sa click outside */
#overlay{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:5;
}

/* main content */
.main{
  height:100vh;
}

iframe{
  width:100%;
  height:100%;
  border:none;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <span class="menu-btn" onclick="toggleMenu()">=</span>Menu
</div>

<!-- Overlay -->
<div id="overlay" onclick="toggleMenu()"></div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
  <button onclick="loadPage('customer.html')">Back home</button>
  <button onclick="loadPage('uploadvouchers.html')">Add Voucher</button>
  <button onclick="loadPage('history.html')">History</button>
  <button onclick="loadPage('settings.html')">Settings</button>

  <!-- Logout button sa pinaka-baba, icon-only -->
  <button onclick="openMITScreen('Screen1')" style="position:absolute; bottom:50px; width:100%; background-color:transparent;">
    <i class="fas fa-right-from-bracket"></i>logout
  </button>
</div>

<!-- MAIN CONTENT -->
<div class="main">
  <iframe id="frame" src="customer.html"></iframe>
</div>

<script>
let menuOpen=false;

function toggleMenu(){
  let sidebar=document.getElementById("sidebar");
  let overlay=document.getElementById("overlay");
  if(menuOpen){
    sidebar.style.left="-180px";
    overlay.style.display="none";
    menuOpen=false;
  }else{
    sidebar.style.left="0";
    overlay.style.display="block";
    menuOpen=true;
  }
}

function loadPage(page){
  document.getElementById("frame").src=page;
  toggleMenu();
}

// Direktang logout, tawagin agad MIT Screen1
function openMITScreen(screenName){
  if(typeof webstring === "function"){
    webstring(screenName); // tatawag sa MIT WebViewer
  } else {
    console.log("Webstring function not found. MIT App Inventor only.");
  }
  toggleMenu(); // close sidebar kung open
}

/* Disable pinch zoom */
document.addEventListener('gesturestart', function (e) {
  e.preventDefault();
});

document.addEventListener('touchmove', function (e) {
  if (e.scale !== 1) { e.preventDefault(); }
}, { passive: false });
</script>

</body>
</html>
