<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telepreneur Main Page</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<style>
html, body {
    margin:0;
    font-family: Arial, sans-serif;
    height:100vh;
    background:black;
    color:white;
}
.content {
    height:100vh;
    overflow:hidden;
}
#mainFrame {
    width:100%;
    height:90%;
    border:none;
}

/* Floating Bottom */
.bottom-bar {
    position:fixed;
    bottom:20px;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:0 10px;
    box-sizing:border-box;
}
.side-container { display:flex; flex-direction:row; gap:10px; }
.side-item { display:flex; flex-direction:column; align-items:center; }
.side-btn {
    display:flex;
    justify-content:center;
    align-items:center;
    width:65px;
    height:30px;
    background:transparent;
    backdrop-filter:blur(2px);
    border-radius:12px;
    color: #3498db;
    font-size:22px;
    cursor:pointer;
    box-shadow:0 4px 10px rgba(0,0,0,0.5);
    transition: transform 0.2s;
}
.side-btn:hover { transform: scale(1.1); }
.side-label { font-size:14px; margin-top:2px; }

/* Center Floating */
.center-btn {
    position:fixed;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    width:70px;
    height:70px;
    border-radius:50%;
    background: #3498db;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
    color:white;
    cursor:pointer;
    box-shadow:0 8px 20px rgba(0,0,0,0.6);
    transition: transform 0.2s;
}
.center-btn:hover { transform: translateX(-50%) scale(1.1); }
.center-label {
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    font-size:14px;
}
</style>
</head>
<body>

<div class="content">
    <iframe id="mainFrame" src="mainpage.html"></iframe>
</div>

<!-- Floating Side -->
<div class="bottom-bar">
    <div class="side-container">
        <div class="side-item">
            <div class="side-btn" onclick="loadPage('s.html')"><i class="fas fa-arrow-left"></i></div>
            <div class="side-label">Back</div>
        </div>
        <div class="side-item">
            <div class="side-btn" onclick="loadPage('submainpage.html')"><i class="fas fa-home"></i></div>
            <div class="side-label">Home</div>
        </div>
    </div>
    <div class="side-container">
        <div class="side-item">
            <div class="side-btn" onclick="loadPage('settings.html')"><i class="fas fa-cog"></i></div>
            <div class="side-label">Settings</div>
        </div>
        <div class="side-item">
            <div class="side-btn" onclick="loadPage('next.html')"><i class="fas fa-arrow-right"></i></div>
            <div class="side-label">Next</div>
        </div>
    </div>
</div>

<!-- Center Floating -->
<div class="center-btn" onclick="loadPage('voucher.html')">
    <i class="fas fa-store-alt"></i>
</div>
<div class="center-label">Store</div>

<script>
function loadPage(url) {
    document.getElementById('mainFrame').src = url;
}
</script>
</body>
</html>
