<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Voucher Loader with MPIN Notifications</title>
<style>
body{font-family:Arial;background:#0f172a;color:white;padding:20px;}
.container{max-width:520px;margin:auto;background:#1e293b;padding:25px;border-radius:12px;box-shadow:0 0 20px rgba(0,0,0,0.4);}
h3{text-align:center;margin-bottom:20px;}
label{font-size:14px;opacity:.8;}
select,textarea,input{width:100%;padding:12px;font-size:16px;margin-top:5px;margin-bottom:15px;border-radius:6px;border:none;}
textarea{height:200px;resize:none;}
button{margin-top:15px;width:100%;padding:14px;font-size:18px;border:none;border-radius:8px;background:linear-gradient(45deg,#22c55e,#16a34a);color:white;font-weight:bold;cursor:pointer;}
button:disabled{opacity:.5;}
#status{text-align:center;margin-top:12px;font-size:14px;transition:all 0.3s ease;}

/* Modal styles */
.modal{display:none;position:fixed;z-index:999;left:0;top:0;width:100%;height:100%;overflow:auto;background-color:rgba(0,0,0,0.6);}
.modal-content{background:#1e293b;margin:15% auto;padding:20px;border-radius:12px;width:90%;max-width:400px;text-align:center;}
.modal-content input{margin-bottom:10px;}
.modal-content button{width:100%;}
</style>
</head>
<body>

<div class="container">
<h3>Voucher Loader</h3>

<label>Select Sheet</label>
<select id="sheet">
<option value="V5">V5</option>
<option value="V10">V10</option>
<option value="V15">V15</option>
<option value="V20">V20</option>
<option value="V25">V25</option>
<option value="V30">V30</option>
<option value="V35">V35</option>
<option value="V50">V50</option>
</select>

<label>Paste Vouchers</label>
<textarea id="vouchers" placeholder="Paste vouchers here..."></textarea>

<div class="info">
<span id="count">0 vouchers</span>
<span>1 per line</span>
</div>

<button id="uploadBtn">UPLOAD</button>
<div id="status"></div>
</div>

<!-- MPIN Modal -->
<div id="mpinModal" class="modal">
  <div class="modal-content">
    <h3>Enter MPIN</h3>
    <input type="password" id="mpinInput" placeholder="Enter MPIN">
    <button id="mpinSubmit">Submit</button>
    <div id="mpinError" style="margin-top:10px;color:#f87171;"></div>
  </div>
</div>

<script>
const url="https://script.google.com/macros/s/AKfycbxl21YXKPN45BLW9VXb2ENQLI_4M0D-S7F3LsI4nksIfNyU-HQu5UCVBTDLmg9zU-EmKw/exec"; // Palitan ng Apps Script URL
const textarea=document.getElementById("vouchers");
const count=document.getElementById("count");
const btn=document.getElementById("uploadBtn");
const modal=document.getElementById("mpinModal");
const mpinInput=document.getElementById("mpinInput");
const mpinSubmit=document.getElementById("mpinSubmit");
const mpinError=document.getElementById("mpinError");
const statusDiv=document.getElementById("status");
let currentMPIN="";

// Count vouchers
textarea.addEventListener("input",()=>{
  let lines=textarea.value.split("\n").filter(v=>v.trim()!="");
  count.innerText=lines.length+" vouchers";
});

// Show MPIN modal when upload clicked
btn.addEventListener("click",()=>{
  let lines=textarea.value.split("\n").map(v=>v.trim()).filter(v=>v!="");
  if(lines.length===0){
    showStatus("❌ Paste vouchers first", "red");
    return;
  }
  mpinError.innerText="";
  mpinInput.value="";
  modal.style.display="block";
  mpinInput.focus();
});

// Handle MPIN submission
mpinSubmit.addEventListener("click",()=>{
  const mpin = mpinInput.value.trim();
  if(!mpin){
    mpinError.innerText="MPIN is required";
    return;
  }
  modal.style.display="none";
  currentMPIN = mpin;
  uploadVouchers();
});

// Upload function
function uploadVouchers(){
  const sheet=document.getElementById("sheet").value;
  const lines=textarea.value.split("\n").map(v=>v.trim()).filter(v=>v!="");

  btn.disabled=true;
  btn.innerText="Uploading...";
  showStatus("⏳ Uploading...", "white");

  fetch(url,{
    method:"POST",
    body:JSON.stringify({sheet:sheet,vouchers:lines,mpin:currentMPIN})
  })
  .then(res=>res.text())
  .then(data=>{
    const res=JSON.parse(data);
    if(res.error){
      showStatus(`❌ ${res.error}`, "red");
    } else {
      showStatus(`✅ Uploaded ${res.uploaded} vouchers to ${res.sheet}. Skipped ${res.skipped} duplicates.`, "green");
      textarea.value="";
      count.innerText="0 vouchers";
    }
    btn.disabled=false;
    btn.innerText="UPLOAD";
  })
  .catch(()=>{
    showStatus("❌ Upload failed", "red");
    btn.disabled=false;
    btn.innerText="UPLOAD";
  });
}

// Function to show status messages with color and auto-fade
function showStatus(msg, color){
  statusDiv.innerText = msg;
  statusDiv.style.color = color;
  setTimeout(()=>{statusDiv.innerText="";},60000);
}

// Close modal if clicked outside
window.onclick = function(event) {
  if(event.target==modal){
    modal.style.display="none";
  }
}
</script>
</body>
</html>
