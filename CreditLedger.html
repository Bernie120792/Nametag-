<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Utang Listahan</title><style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:#f7f7f7;color:#222}.container{max-width:700px;margin:auto;padding:5px 5px 75px}button{border:0;border-radius:7px;padding:9px 11px;font-size:14px;cursor:pointer}button:disabled{opacity:.6;cursor:not-allowed}.primary{background:#9400D3;color:#fff}.secondary{background:#e5e7eb;color:#222}.danger{background:#dc2626;color:#fff}.balance-card{background:#9400D3;color:#fff;padding:14px;border-radius:12px;text-align:center;margin-bottom:5px}.balance-title{font-size:11px;opacity:.85}.total-balance{font-size:29px;font-weight:bold;margin-top:2px}.customer-card{background:#fff;border-radius:9px;padding:9px 10px;margin-bottom:4px;box-shadow:0 1px 4px rgba(0,0,0,.07);cursor:pointer}.customer-card:active{transform:scale(.98)}.customer-name{font-size:16px;font-weight:bold}.customer-contact{font-size:11px;color:#9400D3;margin-top:1px}.customer-balance{font-size:17px;font-weight:bold;color:#9400D3;margin-top:3px}.floating-add{position:fixed;right:18px;bottom:18px;height:48px;padding:0 18px;border-radius:25px;background:#9400D3;color:#fff;font-size:14px;font-weight:bold;box-shadow:0 3px 10px rgba(0,0,0,.3);z-index:10}.floating-add:active{transform:scale(.92)}.ledger-header{display:flex;align-items:center;gap:6px;margin-bottom:5px;height:35px}.back-btn{background:transparent;font-size:27px;padding:0 4px}.ledger-name{font-size:19px;font-weight:bold;flex:1}.ledger-icons{font-size:25px;color:#9400D3;padding:0 8px;cursor:pointer}.ledger-summary{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 5px rgba(0,0,0,.07);margin-bottom:6px}.ledger-balance{background:linear-gradient(135deg,#9400D3,#e83e9b);color:#fff;text-align:center;padding:11px 8px}.ledger-balance-label{font-size:12px}.ledger-balance-amount{font-size:30px;font-weight:bold;margin-top:1px}.summary-row{display:flex;padding:8px 3px;text-align:center}.summary-box{flex:1}.summary-label{font-size:11px;color:#444}.summary-value{font-size:15px;font-weight:bold;margin-top:2px}.payment-value{color:#087c39}.credit-value{color:#a51e26}.filters{display:flex;gap:5px;margin:5px 0 6px}.filter-btn{flex:1;background:#fff;border:2px solid #9400D3;color:#333;padding:7px 4px}.filter-btn.active{background:#9400D3;color:#fff}.transaction-list{display:flex;flex-direction:column;gap:5px}.transaction-card{background:#fff;border-radius:11px;display:grid;grid-template-columns:1.25fr .8fr .8fr;min-height:78px;overflow:hidden;box-shadow:0 1px 5px rgba(0,0,0,.06);cursor:pointer}.transaction-card:active{transform:scale(.99)}.transaction-info{padding:8px}.transaction-id{font-size:12px;font-weight:bold;color:#5c277b;margin-bottom:3px}.transaction-date{font-size:12px;color:#444}.transaction-type{display:flex;align-items:center;justify-content:center;font-size:16px;background:#fafafa}.transaction-amount{display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:bold;padding:5px;text-align:center}.amount-bayad{color:#087c39}.amount-utang{color:#a51e26}.bottom-actions{position:fixed;bottom:0;left:0;right:0;max-width:700px;margin:auto;display:flex;gap:5px;padding:5px;background:#fff;z-index:5;box-shadow:0 -2px 7px rgba(0,0,0,.12)}.bottom-actions button{flex:1;height:52px;font-size:16px;font-weight:bold;color:#fff}.in-button{background:#e91e8c}.out-button{background:#54277d}.menu{display:none;position:absolute;right:8px;top:38px;background:#fff;border-radius:9px;padding:5px;box-shadow:0 2px 10px rgba(0,0,0,.2);z-index:10}.menu button{display:block;width:150px;text-align:left;background:#fff;margin:2px 0}.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);align-items:center;justify-content:center;padding:8px;z-index:20}.modal-box{background:#fff;width:100%;max-width:450px;border-radius:12px;padding:12px}.modal-title{font-size:19px;font-weight:bold;margin-bottom:8px}input,select,textarea{width:100%;padding:10px;border:1px solid #ddd;border-radius:7px;font-size:16px;margin-bottom:7px}textarea{min-height:60px;resize:vertical}.modal-buttons{display:flex;gap:6px}.modal-buttons button{flex:1}.empty{text-align:center;padding:18px;color:#777}.notice-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);align-items:center;justify-content:center;padding:15px;z-index:50}.notice-box{background:#fff;width:100%;max-width:360px;border-radius:14px;padding:18px;text-align:center;box-shadow:0 5px 25px rgba(0,0,0,.25);animation:pop .18s ease}.notice-icon{font-size:38px;margin-bottom:5px}.notice-title{font-size:19px;font-weight:bold;margin-bottom:6px}.notice-message{font-size:14px;color:#555;margin-bottom:15px;line-height:1.4}.notice-buttons{display:flex;gap:7px}.notice-buttons button{flex:1}@keyframes pop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-20px);background:#222;color:#fff;padding:11px 18px;border-radius:25px;font-size:14px;opacity:0;pointer-events:none;z-index:100;transition:.25s;white-space:nowrap}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style></head><body><div class="container"><div id="dashboardPage"><div class="balance-card"><div class="balance-title">TOTAL BALANCE</div><div class="total-balance" id="totalBalance">₱0.00</div></div><div id="customerList"></div><button class="floating-add" onclick="openAddCustomerModal()">ADD CUSTOMER</button></div><div id="detailPage" style="display:none"><div class="ledger-header"><button class="back-btn" onclick="showDashboard()">‹</button><div class="ledger-name" id="detailName"></div><div class="ledger-icons" onclick="toggleMenu()">⋮</div><div class="menu" id="customerMenu"><button onclick="openEditCustomerModal()">✏️ EDIT CUSTOMER</button><button onclick="deleteCurrentCustomer()" style="color:#dc2626">🗑 DELETE CUSTOMER</button></div></div><div class="ledger-summary"><div class="ledger-balance"><div class="ledger-balance-label">Total Balance</div><div class="ledger-balance-amount" id="detailBalance">₱0.00</div></div><div class="summary-row"><div class="summary-box"><div class="summary-label">Customer Ledger</div><div class="summary-value" id="entryCount">0 Entries</div></div><div class="summary-box"><div class="summary-label">Total Payment</div><div class="summary-value payment-value" id="totalPayment">₱0.00</div></div><div class="summary-box"><div class="summary-label">Total Credit</div><div class="summary-value credit-value" id="totalCredit">₱0.00</div></div></div></div><div class="filters"><button class="filter-btn active" onclick="setFilter('ALL',this)">ALL</button><button class="filter-btn" onclick="setFilter('UNPAID',this)">UNPAID</button><button class="filter-btn" onclick="setFilter('PAID',this)">PAID</button></div><div id="historyList" class="transaction-list"></div><div class="bottom-actions"><button class="in-button" onclick="openTransactionModal('BAYAD')">IN<br><small>(BAYAD)</small></button><button class="out-button" onclick="openTransactionModal('UTANG')">OUT<br><small>(UTANG)</small></button></div></div></div><div class="modal" id="customerModal"><div class="modal-box"><div class="modal-title" id="customerModalTitle">Add Customer</div><input id="customerName" type="text" placeholder="Customer name"><input id="customerContact" type="text" placeholder="Contact number (optional)"><div class="modal-buttons"><button class="secondary" onclick="closeModals()">CANCEL</button><button class="primary" id="customerSaveBtn" onclick="saveCustomer()">SAVE</button></div></div></div><div class="modal" id="transactionModal"><div class="modal-box"><div class="modal-title" id="transactionModalTitle">Add Transaction</div><select id="transactionType"><option value="UTANG">UTANG</option><option value="BAYAD">BAYAD</option></select><input id="transactionAmount" type="number" placeholder="Amount" step="0.01"><textarea id="transactionDescription" placeholder="Description"></textarea><input id="transactionDate" type="date"><div class="modal-buttons"><button class="secondary" onclick="closeModals()">CANCEL</button><button class="primary" id="transactionSaveBtn" onclick="saveTransaction()">SAVE</button></div><div id="deleteTransactionBox" style="display:none;margin-top:6px"><button class="danger" onclick="deleteEditingTransaction()">🗑 DELETE TRANSACTION</button></div></div></div><div class="notice-modal" id="noticeModal"><div class="notice-box"><div class="notice-icon" id="noticeIcon">ℹ️</div><div class="notice-title" id="noticeTitle">Notification</div><div class="notice-message" id="noticeMessage"></div><div class="notice-buttons"><button class="secondary" id="noticeCancelBtn" onclick="closeNotice()">OK</button><button class="primary" id="noticeConfirmBtn" style="display:none">CONFIRM</button></div></div></div><div class="toast" id="toast"></div><script>
const API_URL="https://script.google.com/macros/s/AKfycbxaEKk3RoSZ6leot4QpUoRILF1onBfwKUpbBMTbsyZlh5_-rdEaoxN21v-9vX5HQoSyqA/exec";let customers=[],transactions=[],currentCustomer=null,editingCustomerId=null,editingTransactionId=null,currentFilter="ALL",savingCustomer=false,savingTransaction=false;loadData();
function loadData(){fetch(API_URL+"?action=getData").then(r=>r.json()).then(data=>{if(!data.success){showNotice("Error","❌",data.message||"May error sa data.");return}customers=data.customers||[];transactions=data.transactions||[];renderDashboard();if(currentCustomer){const updated=customers.find(c=>String(c.id)===String(currentCustomer.id));if(updated){currentCustomer=updated;renderDetail()}}}).catch(error=>{console.error(error);showNotice("Connection Error","⚠️","Wait, server problem.")})}
function postData(data){return fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(data)}).then(r=>r.json())}
function getCustomerBalance(id){let balance=0;transactions.filter(t=>String(t.customerId)===String(id)).forEach(t=>{if(t.type==="UTANG")balance+=Number(t.amount);if(t.type==="BAYAD")balance-=Number(t.amount)});return balance}
function getTotalBalance(){return customers.reduce((total,c)=>total+getCustomerBalance(c.id),0)}
function formatMoney(amount){return"₱"+Number(amount||0).toLocaleString("en-PH",{minimumFractionDigits:2,maximumFractionDigits:2})}
function getDateOnly(date){const text=String(date||"");if(!text)return"";if(text.length<=10)return text.substring(0,10);const d=new Date(text);if(isNaN(d.getTime()))return text.substring(0,10);const parts=new Intl.DateTimeFormat("en-CA",{timeZone:"Asia/Manila",year:"numeric",month:"2-digit",day:"2-digit"}).formatToParts(d);return parts.find(x=>x.type==="year").value+"-"+parts.find(x=>x.type==="month").value+"-"+parts.find(x=>x.type==="day").value}
function formatDate(date){const p=getDateOnly(date).split("-");if(p.length!==3)return date;const months=["January","February","March","April","May","June","July","August","September","October","November","December"];return months[Number(p[1])-1]+" "+Number(p[2])+" "+p[0]}
function renderDashboard(){document.getElementById("totalBalance").textContent=formatMoney(getTotalBalance());const list=document.getElementById("customerList");if(!customers.length){list.innerHTML='<div class="empty">Wala pang customer.</div>';return}list.innerHTML="";customers.forEach(customer=>{const card=document.createElement("div");card.className="customer-card";card.onclick=()=>openCustomer(customer.id);card.innerHTML=`<div class="customer-name">${escapeHTML(customer.name)}</div><div class="customer-contact">${escapeHTML(customer.contact||"")}</div><div class="customer-balance">${formatMoney(getCustomerBalance(customer.id))}</div>`;list.appendChild(card)})}
function openCustomer(id){currentCustomer=customers.find(c=>String(c.id)===String(id));if(!currentCustomer)return;currentFilter="ALL";document.getElementById("dashboardPage").style.display="none";document.getElementById("detailPage").style.display="block";document.getElementById("customerMenu").style.display="none";document.querySelectorAll(".filter-btn").forEach((b,i)=>b.classList.toggle("active",i===0));renderDetail()}
function renderDetail(){const list=transactions.filter(t=>String(t.customerId)===String(currentCustomer.id));let payment=0,credit=0;list.forEach(t=>{if(t.type==="BAYAD")payment+=Number(t.amount);if(t.type==="UTANG")credit+=Number(t.amount)});document.getElementById("detailName").textContent=currentCustomer.name;document.getElementById("detailBalance").textContent=formatMoney(credit-payment);document.getElementById("totalPayment").textContent=formatMoney(payment);document.getElementById("totalCredit").textContent=formatMoney(credit);document.getElementById("entryCount").textContent=list.length+" Entries";renderHistory()}
function setFilter(filter,button){currentFilter=filter;document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));button.classList.add("active");renderHistory()}
function renderHistory(){let history=transactions.filter(t=>String(t.customerId)===String(currentCustomer.id));if(currentFilter==="PAID")history=history.filter(t=>t.type==="BAYAD");if(currentFilter==="UNPAID")history=history.filter(t=>t.type==="UTANG");history.sort((a,b)=>String(b.date).localeCompare(String(a.date)));const list=document.getElementById("historyList");if(!history.length){list.innerHTML='<div class="empty">Wala pang transaction.</div>';return}list.innerHTML="";history.forEach(t=>{const isBayad=t.type==="BAYAD";const item=document.createElement("div");item.className="transaction-card";item.innerHTML=`<div class="transaction-info"><div class="transaction-id">${escapeHTML(t.id)}</div><div class="transaction-date">${formatDate(t.date)}</div></div><div class="transaction-type">${isBayad?"Bayad":"Utang"}</div><div class="transaction-amount ${isBayad?"amount-bayad":"amount-utang"}">${formatMoney(t.amount)}</div>`;item.onclick=()=>openEditTransactionModal(t.id);list.appendChild(item)})}
function showDashboard(){currentCustomer=null;document.getElementById("detailPage").style.display="none";document.getElementById("dashboardPage").style.display="block";document.getElementById("customerMenu").style.display="none";renderDashboard()}
function toggleMenu(){const menu=document.getElementById("customerMenu");menu.style.display=menu.style.display==="block"?"none":"block"}
function openAddCustomerModal(){editingCustomerId=null;document.getElementById("customerModalTitle").textContent="Add Customer";document.getElementById("customerName").value="";document.getElementById("customerContact").value="";document.getElementById("customerSaveBtn").disabled=false;document.getElementById("customerSaveBtn").textContent="SAVE";document.getElementById("customerModal").style.display="flex"}
function openEditCustomerModal(){if(!currentCustomer)return;editingCustomerId=currentCustomer.id;document.getElementById("customerModalTitle").textContent="EDIT CUSTOMER";document.getElementById("customerName").value=currentCustomer.name;document.getElementById("customerContact").value=currentCustomer.contact||"";document.getElementById("customerMenu").style.display="none";document.getElementById("customerModal").style.display="flex"}
function saveCustomer(){if(savingCustomer)return;const name=document.getElementById("customerName").value.trim();const contact=document.getElementById("customerContact").value.trim();if(!name){showNotice("Required","⚠️","Ilagay ang pangalan ng customer.");return}savingCustomer=true;const btn=document.getElementById("customerSaveBtn");btn.disabled=true;btn.textContent="SAVING...";const data=editingCustomerId?{action:"editCustomer",id:editingCustomerId,name,contact}:{action:"addCustomer",name,contact};postData(data).then(result=>{if(!result.success){showNotice("Error","❌",result.message||"Hindi na-save ang customer.");return}closeModals();showToast(editingCustomerId?"Customer updated":"Customer added");loadData()}).catch(()=>{showNotice("Error","❌","Hindi na-save ang customer.")}).finally(()=>{savingCustomer=false;btn.disabled=false;btn.textContent="SAVE"})}
function deleteCurrentCustomer(){if(!currentCustomer)return;showConfirm("Delete Customer","🗑️","Sigurado ka bang i-delete ang customer at lahat ng history nito?",()=>{postData({action:"deleteCustomer",id:currentCustomer.id}).then(result=>{if(!result.success){showNotice("Error","❌",result.message||"Hindi na-delete ang customer.");return}currentCustomer=null;closeModals();showDashboard();showToast("Customer deleted");loadData()}).catch(()=>{showNotice("Error","❌","Hindi na-delete ang customer.")})})}
function openTransactionModal(type){editingTransactionId=null;document.getElementById("transactionModalTitle").textContent=type==="BAYAD"?"IN (BAYAD)":"OUT (UTANG)";document.getElementById("transactionType").value=type;document.getElementById("transactionAmount").value="";document.getElementById("transactionDescription").value="";document.getElementById("transactionDate").value=getToday();document.getElementById("deleteTransactionBox").style.display="none";document.getElementById("transactionSaveBtn").disabled=false;document.getElementById("transactionSaveBtn").textContent="SAVE";document.getElementById("transactionModal").style.display="flex"}
function openEditTransactionModal(id){const t=transactions.find(x=>String(x.id)===String(id));if(!t)return;editingTransactionId=t.id;document.getElementById("transactionModalTitle").textContent="EDIT TRANSACTION";document.getElementById("transactionType").value=t.type;document.getElementById("transactionAmount").value=t.amount;document.getElementById("transactionDescription").value=t.description||"";document.getElementById("transactionDate").value=getDateOnly(t.date);document.getElementById("deleteTransactionBox").style.display="block";document.getElementById("transactionSaveBtn").disabled=false;document.getElementById("transactionSaveBtn").textContent="SAVE";document.getElementById("transactionModal").style.display="flex"}
function saveTransaction(){if(savingTransaction)return;const type=document.getElementById("transactionType").value;const amount=Number(document.getElementById("transactionAmount").value);const description=document.getElementById("transactionDescription").value.trim();const date=document.getElementById("transactionDate").value;if(!amount||amount<=0){showNotice("Invalid Amount","⚠️","Ilagay ang tamang amount.");return}savingTransaction=true;const btn=document.getElementById("transactionSaveBtn");btn.disabled=true;btn.textContent="SAVING...";const data=editingTransactionId?{action:"editTransaction",id:editingTransactionId,type,amount,description,date}:{action:"addTransaction",customerId:currentCustomer.id,type,amount,description,date};postData(data).then(result=>{if(!result.success){showNotice("Error","❌",result.message||"Hindi na-save ang transaction.");return}closeModals();showToast(editingTransactionId?"Transaction updated":"Transaction saved");loadData()}).catch(()=>{showNotice("Error","❌","Hindi na-save ang transaction.")}).finally(()=>{savingTransaction=false;btn.disabled=false;btn.textContent="SAVE"})}
function deleteEditingTransaction(){if(!editingTransactionId)return;showConfirm("Delete Transaction","🗑️","Sigurado ka bang i-delete ang transaction na ito?",()=>{postData({action:"deleteTransaction",id:editingTransactionId}).then(result=>{if(!result.success){showNotice("Error","❌",result.message||"Hindi na-delete ang transaction.");return}closeModals();showToast("Transaction deleted");loadData()}).catch(()=>{showNotice("Error","❌","Hindi na-delete ang transaction.")})})}
function closeModals(){document.querySelectorAll(".modal").forEach(m=>m.style.display="none");document.getElementById("customerMenu").style.display="none";editingCustomerId=null;editingTransactionId=null}
function showNotice(title,icon,message){document.getElementById("noticeIcon").textContent=icon;document.getElementById("noticeTitle").textContent=title;document.getElementById("noticeMessage").textContent=message;document.getElementById("noticeCancelBtn").textContent="OK";document.getElementById("noticeCancelBtn").style.display="block";document.getElementById("noticeConfirmBtn").style.display="none";document.getElementById("noticeModal").style.display="flex"}
function showConfirm(title,icon,message,callback){const modal=document.getElementById("noticeModal");const confirmBtn=document.getElementById("noticeConfirmBtn");document.getElementById("noticeIcon").textContent=icon;document.getElementById("noticeTitle").textContent=title;document.getElementById("noticeMessage").textContent=message;document.getElementById("noticeCancelBtn").textContent="CANCEL";document.getElementById("noticeCancelBtn").style.display="block";confirmBtn.style.display="block";modal.style.display="flex";confirmBtn.onclick=()=>{modal.style.display="none";callback()}}
function closeNotice(){document.getElementById("noticeModal").style.display="none"}
function showToast(message){const toast=document.getElementById("toast");toast.textContent="✓ "+message;toast.classList.add("show");clearTimeout(window.toastTimer);window.toastTimer=setTimeout(()=>toast.classList.remove("show"),2200)}
function getToday(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function escapeHTML(value){return String(value||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;")}
</script></body></html>
