<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PISO Voucher Dispenser</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body{
  font-family:Arial;
  background:#111;
  color:#fff;
  padding:20px;
  text-align:center;
}
button{
  padding:15px 30px;
  font-size:18px;
  background:#00c853;
  border:none;
  color:white;
  cursor:pointer;
}
button:hover{
  background:#00a844;
}
#voucher{
  margin-top:30px;
  font-size:24px;
  color:#00e676;
  word-break:break-word;
}
</style>
</head>
<body>

<h3>PISO Voucher Dispenser</h3>

<button onclick="getVoucher()">Get Voucher</button>

<div id="voucher">Click to get a voucher</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getFirestore, collection, query, where, getDocs, doc, updateDoc, limit } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

// 🔹 Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyCWR082fKeQ-4S0rXKx3W_ugWRrvx7O7Wg",
  authDomain: "voucher-3f60d.firebaseapp.com",
  projectId: "voucher-3f60d",
  storageBucket: "voucher-3f60d.firebasestorage.app",
  messagingSenderId: "550525298282",
  appId: "1:550525298282:web:b6d62f5ee1a7c87d644c13",
  measurementId: "G-BH16HYQ2MC"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function getVoucher(){
  const voucherRef = collection(db,"vouchers","piso","codes");
  const q = query(voucherRef, where("used","==",false), limit(1));
  const snapshot = await getDocs(q);

  if(snapshot.empty){
    document.getElementById("voucher").innerText="No more vouchers available!";
    return;
  }

  // Kunin ang first voucher
  let voucherData;
  snapshot.forEach(docSnap => {
    voucherData = { id: docSnap.id, data: docSnap.data() };
  });

  // I-mark as used
  const docRef = doc(db,"vouchers","piso","codes",voucherData.id);
  await updateDoc(docRef,{ used:true, claimedAt:Date.now() });

  // I-display
  document.getElementById("voucher").innerText=voucherData.id;
}
</script>

</body>
</html>
