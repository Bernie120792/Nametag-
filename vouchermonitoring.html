<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Voucher Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: Arial, sans-serif;
  background: #121212;
  color: #fff;
  margin: 0;
  padding: 20px;
}

h3 {
  text-align: center;
  font-size: 22px;
  margin-bottom: 10px;
  color: #ffffff;
}

table {
  width: 100%;
  max-width: 900px;
  margin: 0 auto;
  border-collapse: collapse;
  box-shadow: 0 3px 15px rgba(0,0,0,0.5);
}

thead {
  background: #1e1e1e;
}

th, td {
  padding: 12px 10px;
  text-align: center;
  border: 1px solid #333;
}

tr:nth-child(even) {
  background: #1a1a1a;
}

tr:hover {
  background: #2c2c2c;
}

.total { color: #ff6b6b; font-weight: bold; }
.used { color: #1dd1a1; font-weight: bold; }
.unused { color: #54a0ff; font-weight: bold; }
.sales { color: #feca57; font-weight: bold; }

tfoot td {
  font-weight: bold;
  font-size: 16px;
}

@media (max-width:650px) {
  th, td {
    padding: 8px 5px;
    font-size: 14px;
  }
}
</style>
</head>

<body>

<h3>Voucher Monitor Dashboard</h3>

<table>
<thead>
<tr>
<th>Amount</th>
<th>Total Voucher</th>
<th>Used</th>
<th>Unused</th>
<th>Sales</th>
</tr>
</thead>

<tbody id="voucherBody"></tbody>

<tfoot>
<tr>
<td colspan="4">Total Sales</td>
<td id="totalSales" class="sales">0.00</td>
</tr>
</tfoot>
</table>

<script>
// Google Spreadsheet ID
const SPREADSHEET_ID = "1eFJZBfsipeC8XW8BZ3lOgLtuIPNEa--dugzhKpOi8HQ";

// Define sheets & GIDs
const sheets = [
  { name: "₱5", gid: "0" },
  { name: "₱10", gid: "2011951890" },
  { name: "₱15", gid: "1912689784" },
  { name: "₱20", gid: "698952633" }
];

let lastSales = 0;

// Fetch CSV from Google Sheet
async function loadSheet(gid) {
  const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=${gid}`;
  const res = await fetch(url);
  return res.text();
}

// Create table rows
function createRows() {
  let html = "";
  sheets.forEach((s, i) => {
    html += `
    <tr id="row${i}">
      <td>${s.name}</td>
      <td class="total" id="total${i}">0</td>
      <td class="used" id="used${i}">0</td>
      <td class="unused" id="unused${i}">0</td>
      <td class="sales" id="sales${i}">0.00</td>
    </tr>`;
  });
  document.getElementById("voucherBody").innerHTML = html;
}

// Load data and update table
async function loadData() {
  let totalSalesValue = 0;
  let newData = [];

  for (let i = 0; i < sheets.length; i++) {
    try {
      const data = await loadSheet(sheets[i].gid);
      const rows = data.split("\n");
      const cells = rows[1].split(",");

      let total = cells[2] || 0;
      let used = cells[3] || 0;
      let unused = cells[4] || 0;
      let sales = parseFloat(cells[5]) || 0;

      totalSalesValue += sales;
      newData.push({ total, used, unused, sales });
    } catch (e) {
      console.log("Error loading sheet:", e);
    }
  }

  // Update table values
  for (let i = 0; i < newData.length; i++) {
    document.getElementById("total" + i).innerText = newData[i].total;
    document.getElementById("used" + i).innerText = newData[i].used;
    document.getElementById("unused" + i).innerText = newData[i].unused;
    document.getElementById("sales" + i).innerText = newData[i].sales.toFixed(2);
  }

  document.getElementById("totalSales").innerText = totalSalesValue.toFixed(2);
  lastSales = totalSalesValue;
}

// Initialize
createRows();
loadData();
setInterval(loadData, 3000);
</script>

</body>
</html>
