<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Voucher Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body {
    font-family: Arial, sans-serif;
    background: #121212;
    color: #fff;
    margin: 0;
    padding: 20px;
  }

  h2 {
    text-align: center;
    font-size: 28px;
    margin-bottom: 20px;
  }

  table {
    width: 100%;
    max-width: 800px;
    margin: 0 auto;
    border-collapse: collapse;
    box-shadow: 0 3px 10px rgba(0,0,0,0.5);
  }

  thead {
    background: #1e1e1e;
  }

  th, td {
    padding: 12px 10px;
    text-align: center;
    border: 1px solid #333;
  }

  th {
    font-weight: bold;
    color: #fff;
  }

  tr:nth-child(even) {
    background: #1a1a1a;
  }

  tr:hover {
    background: #2c2c2c;
  }

  .total { color: #ff6b6b; font-weight: bold; }
  .used { color: #1dd1a1; font-weight: bold; }
  .unused { color: #54a0ff; font-weight: bold; }

  @media (max-width: 650px) {
    th, td { padding: 8px 5px; font-size: 14px; }
  }
</style>
</head>
<body>

<h2>Voucher Monitor</h2>
<table>
  <thead>
    <tr>
      <th>Amount</th>
      <th>Total</th>
      <th>Used</th>
      <th>Unused</th>
    </tr>
  </thead>
  <tbody id="voucherBody">
    <!-- Data will load here -->
  </tbody>
</table>

<script>
const SPREADSHEET_ID = "1eFJZBfsipeC8XW8BZ3lOgLtuIPNEa--dugzhKpOi8HQ";
const sheets = [
 {name: "5pesos", gid: "0"},
 {name: "10pesos", gid: "2011951890"},
 {name: "15pesos", gid: "1912689784"},
 {name: "20pesos", gid: "1912689784"},
  
// dagdagan dito
];

async function loadSheet(gid){
  const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=${gid}`;
  const res = await fetch(url);
  return res.text();
}

async function loadData(){
  let html = "";
  for(let sheet of sheets){
    try {
      const data = await loadSheet(sheet.gid);
      const rows = data.split("\n");
      const cells = rows[0].split(",");
      html += `<tr>
        <td>${sheet.name}</td>
        <td class="total">${cells[2]}</td>
        <td class="used">${cells[3]}</td>
        <td class="unused">${cells[4]}</td>
      </tr>`;
    } catch(e) {
      html += `<tr>
        <td>${sheet.name}</td>
        <td class="total">0</td>
        <td class="used">0</td>
        <td class="unused">0</td>
      </tr>`;
      console.error(e);
    }
  }
  document.getElementById("voucherBody").innerHTML = html;
}

loadData();
setInterval(loadData, 5000);
</script>

</body>
</html>
